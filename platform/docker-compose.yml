version: '3.8'
services:
  postgres:
    image: postgres:13
    container_name: postgres-freemarket
    environment:
      POSTGRES_DB: freemarket
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d freemarket"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: