spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/freemarket
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.sql.init.mode=never

security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:3600000}

logging.level.com.freemarket.platform=DEBUG
