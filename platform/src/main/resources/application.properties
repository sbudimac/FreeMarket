spring.application.name=freemarket-platform

spring.datasource.url=jdbc:postgresql://localhost:5432/freemarket
spring.datasource.username=admin
spring.datasource.password=password

# CHANGE THIS: use 'validate' instead of 'update' after initial setup
spring.jpa.hibernate.ddl-auto=validate
//ONLY ONCE spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8080
spring.jpa.hibernate.use-uuid-as-primary-key=true


# Optional: Better connection settings
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5