spring.application.name=freemarket-platform

spring.datasource.url=jdbc:postgresql://localhost:5432/freemarket
spring.datasource.username=postgres
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Remove this line - let Hibernate auto-detect the dialect
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
server.port=8080
spring.jpa.hibernate.use-uuid-as-primary-key=true