spring.application.name=freemarket-platform

# === DATABASE CONFIGURATION ===
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/freemarket
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:password}

# === TEMPORARY: Let Flyway run first ===
# Disable Hibernate’s validation for now so it doesn’t crash before Flyway creates tables
spring.jpa.hibernate.ddl-auto=none

# Show SQL just for transparency
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === SERVER CONFIG ===
server.port=8080

# === FLYWAY CONFIGURATION ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Explicitly tell Flyway what DB to migrate (to rule out datasource mismatches)
spring.flyway.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/freemarket
spring.flyway.user=${POSTGRES_USER:admin}
spring.flyway.password=${POSTGRES_PASSWORD:password}

# DEBUG LOGGING for Flyway (so we see what it's doing)
logging.level.org.flywaydb=DEBUG

# Disable Spring’s legacy SQL init
spring.sql.init.mode=never

# Connection pool tuning
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
